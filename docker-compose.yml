services:
  web:
    build: .
    container_name: esfera2excel-web
    env_file:
      - ${ENV_FILE:-.env.prod}
    ports:
      - "127.0.0.1:${HOST_PORT:-8088}:8000"
    volumes:
      - ${DATA_DIR:-/srv/data/esfera2excel/data}:/app/data
      - ${FAILED_UPLOADS_DIR:-/srv/data/esfera2excel/failed_uploads}:/app/failed_uploads
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - |
          import urllib.request
          body = urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5).read()
          raise SystemExit(0 if b'"status":"ok"' in body else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
